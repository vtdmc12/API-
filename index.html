<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giải mã Job từ API</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fc;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 25px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
        }
        .status {
            text-align: center;
            padding: 15px;
            margin: 20px 0;
            background-color: #eaf2f8;
            border-radius: 8px;
            border-left: 6px solid #3498db;
            font-weight: 500;
        }
        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .job-card {
            background-color: #ffffff;
            border: 1px solid #e0e6ed;
            border-radius: 10px;
            padding: 18px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            border-top: 4px solid #5b9bd5;
            display: flex;
            flex-direction: column;
        }
        .job-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
        }
        .job-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1a2634;
            margin-bottom: 12px;
            word-break: break-word;
            line-height: 1.5;
            background: #f8faff;
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 4px solid #3498db;
        }
        .job-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 18px;
            font-size: 0.9rem;
            color: #4a5b6e;
            margin-top: 6px;
        }
        .job-meta span {
            background: #f0f4fa;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
        }
        .job-meta .label {
            font-weight: 500;
            margin-right: 4px;
            color: #2c3e50;
        }
        .badge {
            background-color: #d4e3fd;
            color: #1e4f8a;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 30px;
        }
        .timestamp {
            color: #7f8c8d;
            font-size: 0.8rem;
            margin-top: 8px;
            text-align: right;
            border-top: 1px solid #edf2f7;
            padding-top: 8px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: #5d6d7e;
        }
        .error {
            background-color: #fde8e8;
            border-left: 6px solid #e74c3c;
            padding: 15px;
            border-radius: 8px;
            color: #a93226;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: #95a5a6;
            border-top: 1px solid #eaeef3;
            padding-top: 18px;
        }
        .refresh-btn {
            background-color: #3498db;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
            margin-top: 5px;
            border: 1px solid #2980b9;
        }
        .refresh-btn:hover {
            background-color: #2e86c1;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0 5px;
        }
        .job-count {
            background: #ecf0f1;
            padding: 5px 16px;
            border-radius: 30px;
            font-weight: 500;
        }
        @media (max-width: 600px) {
            .job-grid { grid-template-columns: 1fr; }
            .header-actions { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Giải mã Job từ API</h1>
    <div class="header-actions">
        <div class="job-count" id="jobCount">Đang tải...</div>
        <button class="refresh-btn" onclick="fetchAndDecode()">⟳ Tải lại dữ liệu</button>
    </div>
    <div id="status" class="status">⏳ Đang kết nối đến API...</div>
    <div id="jobContainer" class="job-grid"></div>
    <div class="footer">Dữ liệu được giải mã bằng bảng mã tùy chỉnh • API: dichvugay.onrender.com</div>
</div>

<script>

    const ENCODE_MAP = {

        "n": "qWx♫₿⁂4sHf♪‱7mL₣♦",
        "o": "rBv©﷼⁎8tKd®⁜3hQ⃀♫",
        "p": "nPx™₻⁑2wLq‰‹9sTƒ♪",
        "q": "tMz℃₧⁂5rXd℉⁜8pK৲⁑",
        "r": "qWx÷₰⁎7sHf×⁑4mL৹※",

        "t": "nPx∞₯⁑6wLq∂⁂3sT৳♠",

        "1": "‹⁑↡‱2WnM⁜7xHt※9r↟",
        "2": "⟪※↠⁂4sFd§⁜5kQz‡8t↛",

        "4": "⟫⁜↕※7tRd‰⁑2qPx⁂4s↓",
        "5": "‖⁂↢⁜4vFd☺‡6mWz♪9p↣",
        "6": "•⁑↨※2sKx♫⁜8rBt☞5h↭",
        "7": "♠⁂↮⁜7wRd♥⁑1nQv♣3t↯",

        "-": "÷⁎↦⁜2sL±⁑5vPk∞9m↤",
        "_": "√⁂↥⁜4wK∫⁎8rBt≈6n↴"
    };

    // -------------------- XÂY DỰNG BẢNG GIẢI MÃ --------------------
    const DECODE_MAP = {};
    for (let key in ENCODE_MAP) {
        DECODE_MAP[ENCODE_MAP[key]] = key;
    }

    // -------------------- HÀM GIẢI MÃ --------------------
    function decodeJob(encodedString) {
        if (!encodedString || typeof encodedString !== 'string') return '';
        let result = '';
        let i = 0;
        // Tìm khớp dài nhất (tối đa 30 ký tự để an toàn)
        const MAX_TOKEN_LEN = 30;
        while (i < encodedString.length) {
            let matched = false;
            // Thử từ độ dài lớn nhất đến 1
            for (let len = Math.min(MAX_TOKEN_LEN, encodedString.length - i); len >= 1; len--) {
                const token = encodedString.substring(i, i + len);
                if (DECODE_MAP.hasOwnProperty(token)) {
                    result += DECODE_MAP[token];
                    i += len;
                    matched = true;
                    break;
                }
            }
            if (!matched) {
                // Nếu không khớp, giữ nguyên ký tự (thường là lỗi hoặc ký tự lạ)
                result += encodedString[i];
                i++;
            }
        }
        return result;
    }

    // -------------------- HÀM CHÍNH: LẤY API VÀ GIẢI MÃ --------------------
    async function fetchAndDecode() {
        const statusEl = document.getElementById('status');
        const container = document.getElementById('jobContainer');
        const jobCountEl = document.getElementById('jobCount');

        // Reset UI
        container.innerHTML = '<div class="loading">⏳ Đang tải dữ liệu...</div>';
        statusEl.className = 'status';
        statusEl.textContent = '🔄 Đang gọi API...';

        try {
            const API_URL = 'https://dichvugay.onrender.com/api/c0a7998319e0/all';
            const response = await fetch(API_URL);

            if (!response.ok) {
                throw new Error(`HTTP lỗi! Status: ${response.status}`);
            }

            const data = await response.json();

            // Kiểm tra cấu trúc dữ liệu
            if (!data || !data.jobs || !Array.isArray(data.jobs)) {
                throw new Error('Dữ liệu API không có trường "jobs" hoặc không phải mảng.');
            }

            const jobs = data.jobs;
            const total = jobs.length;
            jobCountEl.textContent = `📦 Tổng số job: ${total}`;

            if (total === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#7f8c8d;">Không có job nào để hiển thị.</div>';
                statusEl.className = 'status';
                statusEl.textContent = '✅ Không có job.';
                return;
            }

            // Giải mã từng job
            let decodedJobs = jobs.map((jobItem, index) => {
                const original = jobItem.job || '';
                const decoded = decodeJob(original);
                return {
                    ...jobItem,
                    decodedJob: decoded,
                    originalJob: original,
                    index: index + 1
                };
            });

            // Hiển thị
            renderJobs(decodedJobs);
            statusEl.className = 'status';
            statusEl.textContent = `✅ Thành công! Hiển thị ${decodedJobs.length} job (đã giải mã).`;

        } catch (error) {
            console.error('Lỗi:', error);
            statusEl.className = 'status error';
            statusEl.textContent = `❌ Lỗi: ${error.message}`;
            container.innerHTML = `<div class="error" style="grid-column:1/-1; padding:20px;">⚠️ Không thể tải dữ liệu. Chi tiết: ${error.message}</div>`;
            jobCountEl.textContent = '⚠️ Lỗi tải';
        }
    }

    // -------------------- HÀM RENDER JOBS --------------------
    function renderJobs(jobs) {
        const container = document.getElementById('jobContainer');
        if (!jobs || jobs.length === 0) {
            container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:30px;">Không có dữ liệu.</div>';
            return;
        }

        let html = '';
        jobs.forEach(job => {
            // Xử lý hiển thị thời gian (t)
            let timeStr = 'N/A';
            if (job.t) {
                try {
                    const date = new Date(job.t);
                    timeStr = date.toLocaleString('vi-VN', { hour12: false });
                } catch (e) {
                    timeStr = String(job.t);
                }
            }

            // Các trường khác
            const players = job.players ?? '?';
            const sea = job.sea ?? '?';
            const boss = job.boss ?? 'Không có';

            html += `
                <div class="job-card">
                    <div class="job-title">📌 ${escapeHtml(job.decodedJob || '🔹 [Rỗng]')}</div>
                    <div class="job-meta">
                        <span><span class="label">👥</span> ${players}</span>
                        <span><span class="label">🌊 Sea</span> ${sea}</span>
                        <span class="badge">⚔️ ${escapeHtml(boss)}</span>
                    </div>
                    <div class="timestamp">🕒 ${timeStr}</div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // Hàm phòng chống XSS đơn giản
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // -------------------- TỰ ĐỘNG CHẠY KHI TẢI TRANG --------------------
    window.addEventListener('load', fetchAndDecode);
</script>
</body>
